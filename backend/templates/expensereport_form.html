{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} ExpenseReport | NexusExpense{% endblock %}
{% block page_title %}{% if editing %}Edit ExpenseReport{% else %}New ExpenseReport{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Title</label>
        <input type="text" name="title" value="{{ record.title|default:'' }}">
      </div>
      <div class="form-group">
        <label>Submitted By</label>
        <input type="text" name="submitted_by" value="{{ record.submitted_by|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Total</label>
        <input type="number" step="0.01" name="total" value="{{ record.total|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Items Count</label>
        <input type="number" name="items_count" value="{{ record.items_count|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="draft" {% if record.status == 'draft' %}selected{% endif %}>Draft</option>
          <option value="submitted" {% if record.status == 'submitted' %}selected{% endif %}>Submitted</option>
          <option value="approved" {% if record.status == 'approved' %}selected{% endif %}>Approved</option>
          <option value="rejected" {% if record.status == 'rejected' %}selected{% endif %}>Rejected</option>
        </select>
      </div>
      <div class="form-group">
        <label>Period</label>
        <input type="text" name="period" value="{{ record.period|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Submitted Date</label>
        <input type="date" name="submitted_date" value="{{ record.submitted_date|date:'Y-m-d'|default:'' }}">
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} ExpenseReport</button>
      <a href="/expensereports/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
