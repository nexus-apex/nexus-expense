{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Expense | NexusExpense{% endblock %}
{% block page_title %}{% if editing %}Edit Expense{% else %}New Expense{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Title</label>
        <input type="text" name="title" value="{{ record.title|default:'' }}">
      </div>
      <div class="form-group">
        <label>Category</label>
        <select name="category">
          <option value="travel" {% if record.category == 'travel' %}selected{% endif %}>Travel</option>
          <option value="food" {% if record.category == 'food' %}selected{% endif %}>Food</option>
          <option value="office" {% if record.category == 'office' %}selected{% endif %}>Office</option>
          <option value="software" {% if record.category == 'software' %}selected{% endif %}>Software</option>
          <option value="equipment" {% if record.category == 'equipment' %}selected{% endif %}>Equipment</option>
          <option value="marketing" {% if record.category == 'marketing' %}selected{% endif %}>Marketing</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Amount</label>
        <input type="number" step="0.01" name="amount" value="{{ record.amount|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Date</label>
        <input type="date" name="date" value="{{ record.date|date:'Y-m-d'|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Submitted By</label>
        <input type="text" name="submitted_by" value="{{ record.submitted_by|default:'' }}">
      </div>
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="pending" {% if record.status == 'pending' %}selected{% endif %}>Pending</option>
          <option value="approved" {% if record.status == 'approved' %}selected{% endif %}>Approved</option>
          <option value="rejected" {% if record.status == 'rejected' %}selected{% endif %}>Rejected</option>
          <option value="reimbursed" {% if record.status == 'reimbursed' %}selected{% endif %}>Reimbursed</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Receipt Url</label>
        <input type="url" name="receipt_url" value="{{ record.receipt_url|default:'' }}">
      </div>
    </div>
    <div class="form-group">
      <label>Notes</label>
      <textarea name="notes">{{ record.notes|default:'' }}</textarea>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Expense</button>
      <a href="/expenses/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
